name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # The conformance corpus is committed in this repo, so tests are self-contained.
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
